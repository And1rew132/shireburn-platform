apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  namespace: {{ .Values.namespace.name }}
type: Opaque
stringData:
  SESSION_SECRET: {{ required "secrets.sessionSecret is required" .Values.secrets.sessionSecret | quote }}
  {{- if not .Values.database.existingSecret }}
  DATABASE_URL: {{- if .Values.database.url }} {{ .Values.database.url | quote }}{{- else if .Values.postgres.enabled }} {{ printf "postgresql://%s:%s@%s-postgres:5432/%s?schema=public" .Values.postgres.username (required "postgres.password is required when postgres.enabled=true" .Values.postgres.password) .Values.nameOverride .Values.postgres.database | quote }}{{- else }} {{ required "database.url is required when database.existingSecret is not set and postgres.enabled=false" .Values.database.url | quote }}{{- end }}
  {{- end }}
