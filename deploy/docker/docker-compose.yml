name: purple-cross-employee-dashboard

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: purple_cross
      POSTGRES_USER: purple_cross
      POSTGRES_PASSWORD: purple_cross_dev_password
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purple_cross -d purple_cross"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  web:
    profiles:
      - app
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://purple_cross:purple_cross_dev_password@postgres:5432/purple_cross?schema=public
      SESSION_SECRET: local-dev-session-secret-change-me
      NUXT_PUBLIC_APP_NAME: Purple Cross Employee Management
    ports:
      - "3000:3000"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.purple-cross.rule: "Host(`${TRAEFIK_HOST:-purple-cross.localhost}`)"
      traefik.http.routers.purple-cross.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.purple-cross.service: purple-cross
      traefik.http.services.purple-cross.loadbalancer.server.port: "3000"
      traefik.http.middlewares.purple-cross-compress.compress: "true"
      traefik.http.routers.purple-cross.middlewares: purple-cross-compress
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - internal
      - traefik

volumes:
  postgres-data:

networks:
  internal:
  traefik:
    name: "${TRAEFIK_NETWORK:-traefik}"
    external: true
