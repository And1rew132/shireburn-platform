name: shireburn-platform

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: purple_cross
      POSTGRES_USER: purple_cross
      POSTGRES_PASSWORD: purple_cross_dev_password
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purple_cross -d purple_cross"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  employee-management-web:
    profiles:
      - app
    build:
      context: ../..
      dockerfile: deploy/docker/dev/Dockerfile
    working_dir: /workspace
    command: >-
      bash -lc "
      set -euo pipefail &&
      npm run db:generate &&
      npm --workspace @purple-cross/web run dev
      "
    environment:
      CHOKIDAR_USEPOLLING: "false"
      FORCE_COLOR: 1
      NODE_ENV: development
      NUXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://purple_cross:purple_cross_dev_password@postgres:5432/purple_cross?schema=public
      SESSION_SECRET: local-dev-session-secret-change-me
      NUXT_PUBLIC_APP_NAME: Shireburn Platform - Employee Management
      __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: "${TRAEFIK_HOST:-shireburn-platform.localhost}"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ../..:/workspace
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.shireburn-employee-management.rule: "Host(`${TRAEFIK_HOST:-shireburn-platform.localhost}`)"
      traefik.http.routers.shireburn-employee-management.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.shireburn-employee-management.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.shireburn-employee-management.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-myresolver}"
      traefik.http.routers.shireburn-employee-management.service: shireburn-employee-management
      traefik.http.services.shireburn-employee-management.loadbalancer.server.port: "3000"
      traefik.http.middlewares.shireburn-employee-management-compress.compress: "true"
      traefik.http.routers.shireburn-employee-management.middlewares: shireburn-employee-management-compress
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - internal
      - traefik
    tty: true
    stdin_open: true
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
  storybook:
    profiles:
      - storybook
    build:
      context: ../..
      dockerfile: deploy/docker/dev/Dockerfile
    working_dir: /workspace
    command: >-
      bash -lc "
      set -euo pipefail &&
      node node_modules/storybook/dist/bin/dispatcher.js dev --config-dir apps/web/.storybook --host 0.0.0.0 --port 6006 --no-open
      "
    environment:
      CHOKIDAR_USEPOLLING: "false"
      FORCE_COLOR: 1
      NODE_ENV: development
      STORYBOOK_DISABLE_TELEMETRY: "1"
      STORYBOOK_HMR_HOST: "${STORYBOOK_HMR_HOST:-}"
      STORYBOOK_HMR_PROTOCOL: "${STORYBOOK_HMR_PROTOCOL:-wss}"
      STORYBOOK_HMR_CLIENT_PORT: "${STORYBOOK_HMR_CLIENT_PORT:-443}"
    ports:
      - "${STORYBOOK_PORT:-6006}:6006"
    volumes:
      - ../..:/workspace
    labels:
      traefik.enable: "true"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik}"
      traefik.http.routers.shireburn-storybook.rule: "Host(`${STORYBOOK_TRAEFIK_HOST:-shireburn-storybook.localhost}`)"
      traefik.http.routers.shireburn-storybook.entrypoints: "${TRAEFIK_ENTRYPOINTS:-web}"
      traefik.http.routers.shireburn-storybook.tls: "${TRAEFIK_TLS:-false}"
      traefik.http.routers.shireburn-storybook.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-myresolver}"
      traefik.http.routers.shireburn-storybook.service: shireburn-storybook
      traefik.http.services.shireburn-storybook.loadbalancer.server.port: "6006"
      traefik.http.middlewares.shireburn-storybook-compress.compress: "true"
      traefik.http.routers.shireburn-storybook.middlewares: shireburn-storybook-compress
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6006 >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - traefik
    tty: true
    stdin_open: true
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
volumes:
  postgres-data:

networks:
  internal:
  traefik:
    name: "${TRAEFIK_NETWORK:-traefik}"
    external: true
