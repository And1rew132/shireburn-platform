name: Build Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: shireburn_employee_management
          POSTGRES_USER: shireburn_employee_management
          POSTGRES_PASSWORD: shireburn_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shireburn_employee_management -d shireburn_employee_management"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://shireburn_employee_management:shireburn_ci_password@127.0.0.1:5432/shireburn_employee_management?schema=public
      SESSION_SECRET: ci-session-secret-for-assessment-review
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run unit tests
        run: npm test

      - name: Run coverage
        run: npm run coverage

      - name: Build Storybook
        run: npm run storybook:build

      - name: Build application
        run: npm run build -- --filter @shireburn-platform/employee-management

      - name: Prepare E2E database
        run: |
          npm --workspace @shireburn-platform/db run migrate:deploy
          npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_WEB_SERVER_COMMAND: HOST=0.0.0.0 PORT=3000 node apps/employee-management/.output/server/index.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/and1rew132/shireburn-platform:main
            ghcr.io/and1rew132/shireburn-platform:${{ github.sha }}
